# Leagues — the anti-gravity racing leagues across the WipEout series (build = code, data = data).
#
# Drives the Leagues page (leagues.html): one [[league]] = one row in a sortable table,
# each opening a full-screen lightbox. Authored in in-game chronological order (that is the
# page's default sort); the table can also be re-sorted by real-world release year.
#
# Per league:
#   name         designation, e.g. "F9000"
#   slug         id (kebab-case)
#   logo         the ONE representative mark shown in the row (a path under marks/; a .png
#                with no sibling .svg is a reference-only/held vector)
#   game         the game the league headlines
#   released     real-world release year (integer, for the "Released" sort)
#   game_year    in-universe year or range shown to the reader (string)
#   game_year_sort  numeric key for the "In-game year" sort (integer)
#   platforms    array of platforms the game shipped / is available on (e.g. ["PS Vita", "PS4"])
#   metascore    optional Metacritic critic score (integer) for the game — omit if the game
#   metacritic   optional canonical Metacritic URL for that platform release
#                has no Metascore (e.g. the 1995 original). Both omitted → no score shown.
#   blurb        1-3 sentences of lore/background for the row + lightbox
#   marks        1+ related marks, each { file = "<cat>/<slug>.svg", note = "…" }
#   fonts        1+ related fonts, each { slug = "<font-slug>", note = "…" } (slug from data/fonts.toml)
#
# Lore is sourced from the WipEout Fandom wiki (Timeline + per-game pages) cross-checked
# against Wikipedia. Typography in WipEout is documented at the series/logo level, not per
# league, so the linked fonts are era-appropriate recreations we host — described as such,
# not claimed as the exact in-game originals.

[[league]]
name = "AGRC"
slug = "agrc"
logo = "leagues/2048.svg"
game = "WipEout 2048"
released = 2012
platforms = ["PS Vita", "PS4"]
game_year = "2048–2050"
game_year_sort = 2048
metascore = 79
metacritic = "https://www.metacritic.com/game/playstation-vita/wipeout-2048/"
blurb = """The Anti-Gravity Racing Championship — the founding era of the sport. Across the
2048–2050 seasons races were run on public streets (chiefly Nova State City), as no dedicated
AG circuits yet existed. Its loose regulation is what drove Pierre Belmondo to call for the
standardisation that became the F3600 League."""
marks = [
  { file = "leagues/2048.svg", note = "The 2048 / AGRC league emblem." },
  { file = "titles/wipeout-2048.svg", note = "The WipEout 2048 game wordmark." },
]
fonts = [
  { slug = "bitsumishi", note = "Bitsumishi — used in the WipEout 2048 logo, wrapping around the ship." },
]

