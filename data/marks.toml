# The 'marks' collection — WipEout logos, emblems, wordmarks & symbols.
# A collection = this file + the marks/ folder. Contributors are shared (contributors.toml).
#
# [[section]]  display groupings, in order (folder, title, blurb).
# [[asset]]    exactly ONE per file in marks/ (1:1). `file` is the path under marks/ —
#              its folder = the section, its extension = hosted (.svg) or reference-only
#              (.png, vector not redistributed). `credit` = contributor id ("" = uncredited).
#              `name` optional (else the slug, title-cased). `source` = get-the-vector URL
#              for reference-only marks. The build warns on any file<->entry drift.

[[section]]
folder = "titles"
title = "Game Titles"
blurb = "Series & game wordmark logos, WipEout (1995) through the Omega Collection."

[[section]]
folder = "teams/wo1"
title = "Teams — WipEout"
blurb = "Racing team logos in their original WipEout (1995) styling."

[[section]]
folder = "teams/2097"
title = "Teams — WipEout 2097"
blurb = "Racing team logos in their WipEout 2097 / XL styling."

[[section]]
folder = "teams/wip3out"
title = "Teams — Wip3out"
blurb = "Racing team logos in their Wip3out styling."

[[section]]
folder = "teams/fusion"
title = "Teams — WipEout Fusion"
blurb = "Racing team logos in their WipEout Fusion styling."

[[section]]
folder = "teams/pure"
title = "Teams — WipEout Pure"
blurb = "Racing team logos in their WipEout Pure styling."

[[section]]
folder = "teams/hd"
title = "Teams — WipEout HD / 2048"
blurb = "Racing team logos & symbol marks from the WipEout HD / 2048 era."

[[section]]
folder = "teams/hd-text"
title = "WipEout HD — Wordmarks & Taglines"
blurb = "Team name wordmarks and slogan / tagline marks from WipEout HD."

[[section]]
folder = "teams/2048"
title = "Teams — WipEout 2048"
blurb = "Racing team logos in their WipEout 2048 styling (the 2048 prequel liveries)."

[[section]]
folder = "pilots"
title = "Pilots"
blurb = "Pilot emblems from the original WipEout."

[[section]]
folder = "classes"
title = "Speed Classes"
blurb = "Speed-class badges from WipEout HD / Fury."

[[section]]
folder = "game-modes"
title = "Game Modes"
blurb = "Game-mode emblems from WipEout HD / Fury."

[[section]]
folder = "weapons"
title = "Weapons"
blurb = "Weapon pickup glyphs."

[[section]]
folder = "sponsors"
title = "Sponsors"
blurb = "In-universe sponsor and brand logos from WipEout HD / Fury."

[[section]]
folder = "tracks"
title = "Tracks & Venues"
blurb = "Circuit / venue logos from WipEout HD / Fury."

[[section]]
folder = "leagues"
title = "Leagues"
blurb = "Anti-gravity racing league logos (F3600, F7200)."

[[section]]
folder = "misc"
title = "Miscellaneous"
blurb = "Ship silhouettes and other marks."

[[section]]
folder = "review"
title = "Found — for review"
blurb = "Extra glyphs discovered inside the source files during an audit. Optional additions, pending review."

