slug = "wo1"
name = "WipEout"
year = 1995
league = "F3600"
title = "titles/wipeout.svg"          # series wordmark (a marks/ vector)
league_logo = "leagues/f3600.svg"
roster = ["ag-systems", "auricom", "feisar", "qirex"]

