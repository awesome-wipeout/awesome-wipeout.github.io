# Teams — brand guidelines across the series (build = code, data = data).
#
# Drives the Teams page (teams.html): a series (columns) x teams (rows) matrix. Each
# [[series]] is a game/era; each [[team]] a row; each [[brand]] one (team, series) cell
# that has a logo. A team in a series' `roster` with no [[brand]] = a gap (logo needed);
# a team absent from the roster = didn't race that series. Logos reuse the marks/ vectors
# (path is under marks/); the page shows the PNG and offers SVG+PNG downloads. Colours are
# optional per brand: state = "official" (documented) or "sampled" (measured from art);
# no colours = unknown. teams.html is generated — do not hand-edit it.
#
# NOTE: the `sampled` colours below were AUTO-SAMPLED from the logo PNGs (dominant
# colours, rough names) — approximate, and monochrome marks sample to a single ink.
# Refine or replace with `official` values from documentation as they're found.

