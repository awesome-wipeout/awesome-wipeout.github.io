[[recreated]]
era = "WipEout Pure"
fonts = [ { family = "FX300 Angular", ttf = "FX300 Angular.ttf", credit = "nr74w" }, { family = "FX300", ttf = "FX300.ttf", credit = "nr74w" }, { family = "2197 Heavy", ttf = "2197 Heavy.ttf", credit = "nr74w" }, { family = "2197 Block", ttf = "2197 Block.ttf", credit = "nr74w" } ]

[[recreated]]
