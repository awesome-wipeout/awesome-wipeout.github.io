# Font references — the library never hosts font files; it shows a generated
# specimen (or the source's preview) and links to 'get' each face. Authored data.
# `credit` on a font is a contributor id from data/contributors.toml (shared registry —
# same as marks). Fonts carry their own per-font `license`.

[source]
repo = "https://github.com/NR74W/WipEout-Fonts"
blob = "https://github.com/NR74W/WipEout-Fonts/blob/master/"
preview = "https://raw.githubusercontent.com/NR74W/WipEout-Fonts/master/previews/"

# NR74W OpenType recreations, grouped by era (order preserved).
[[recreated]]
era = "WipEout · 2097 / 64"
fonts = [ { family = "Amalgama", ttf = "Amalgama.ttf", credit = "nr74w" }, { family = "F5000", ttf = "F5000.ttf", credit = "nr74w" } ]

[[recreated]]
era = "Wip3out"
fonts = [ { family = "F500 Ang-ular", ttf = "F500 Ang-ular.ttf", credit = "nr74w" } ]

[[recreated]]
