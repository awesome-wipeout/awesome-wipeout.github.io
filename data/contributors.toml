# Contributors — every creator credited in the library (logo sources today; font
# designers will join here too). `id` is the stable slug used to credit assets.
# `license` is this creator's default licence (a per-asset licence can override it);
# omit license.url / license.note when there isn't one. `links` are their source pages.
#
# This is authored data. tools/build.py reads it; logos/manifest.json is generated.

