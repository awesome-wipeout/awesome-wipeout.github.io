name: Build check

# The site is generated LOCALLY and its output committed to the repo — GitHub Pages
# serves those files directly, so this workflow does NOT regenerate, commit or deploy
# anything. It just verifies that tools/build.py still runs on a clean checkout, so a
# PR that would break the build is caught early.
#
# Font specimens can't be produced here (the runner has no fonts installed); build.py
# skips that step gracefully and the committed fonts/*.svg are used as-is.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2
          pip install cairosvg pymupdf fonttools lxml pillow

      - name: Build (must succeed)
        run: python3 tools/build.py
