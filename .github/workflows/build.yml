name: Build assets & tear sheet

# Regenerates PNG/PDF derivatives, manifest.json and index.html from the SVGs.
# Contributors only need to add/edit SVGs; this keeps everything else in sync.

on:
  push:
    branches: [main]
    paths:
      - "logos/**/*.svg"
      - "tools/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "logos/**/*.svg"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2
          pip install cairosvg pymupdf

      - name: Build library
        run: python3 tools/build.py

      - name: Commit regenerated files (push to main only)
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logos/**/*.png logos/**/*.pdf logos/manifest.json index.html tearsheet.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild derivatives, manifest and tear sheet [skip ci]"
            git push
          fi

      - name: Verify build is up to date (PRs)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain logos/manifest.json index.html)" ]; then
            echo "::warning::manifest.json / index.html are out of date. Run 'python3 tools/build.py' and commit, or a maintainer will on merge."
          fi
          echo "SVGs rendered successfully."
